<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Health Self-Check Kiosk</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Health Self-Check Kiosk</h1>
  <p>Quick, private BMI check with a personalized recommendation</p>
</header>

<main>

  <!-- User information form -->
  <section class="form-card">
    <form id="bmiForm" novalidate>
      <div class="field-grid">
        <div class="field full">
          <label for="name">Full Name</label>
          <input type="text" id="name" required>
        </div>
        <div class="field">
          <label for="age">Age</label>
          <input type="number" id="age" min="1" max="120" required>
        </div>
        <div class="field">
          <label for="sex">Sex</label>
          <select id="sex" required>
            <option value="">Select</option>
            <option value="Female">Female</option>
            <option value="Male">Male</option>
          </select>
        </div>
        <div class="field">
          <label for="weight">Weight (kg)</label>
          <input type="number" id="weight" min="1" max="400" step="0.1" required>
        </div>
        <div class="field">
          <label for="height">Height (cm)</label>
          <input type="number" id="height" min="1" max="250" step="0.1" required>
        </div>
      </div>

      <p id="formError" class="error hidden" aria-live="polite"></p>

      <button type="submit">Check My BMI</button>
    </form>
  </section>

  <!-- Result card: color + message set by the switch-case in script.js -->
  <section id="resultCard" class="result-card hidden" aria-live="polite">
    <h2 id="resultTitle"></h2>
    <p id="resultBmi"></p>
    <p id="resultMessage"></p>
  </section>

  <!-- Running list built by the loop in script.js -->
  <section class="history-card">
    <h2>Recent Submissions (this session)</h2>
    <ul id="historyList">
      <li class="empty">No submissions yet.</li>
    </ul>
  </section>

</main>

<footer>
  <p>&copy; 2026 Health Self-Check Kiosk — DLSU-D CICS IT Department, Lab 5</p>
</footer>

<script src="script.js"></script>
</body>
</html>
